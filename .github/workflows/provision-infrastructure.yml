name: Reusable terraform CI/CD provision
on:
  workflow_call: 
    inputs: 
      folder-path:
        description: "Provision folder path"
        required: true
        type: string
        
      environment:
        description: "Target environment"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  Validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"

      - name: Validate resources
        run: |
          cd ${{ inputs.folder-path }}
          terraform fmt -check -recursive
          terraform init
          terraform validate
  
  Plan:
    needs: Validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform plan
        run: |
          cd ${{ inputs.folder-path }}
          terraform plan -var-file="./env/${{ inputs.environment }}.tfvars" -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.folder-path }}
          path: tfstate/tfplan

  Apply:
    needs: Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Download plan artifact
        uses: actions/download-artifact@v7
        with:
          name: tfplan
          path: tfstate/

      - name: Terraform apply
        run: |
          cd ${{ inputs.folder-path }}
          terraform apply -var-file="./env/${{ inputs.environment }}.tfvars" -auto-approve tfplan