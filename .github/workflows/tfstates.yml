name: Terraform states CI/CD
on:
  workflow_dispatch:
  push:
    paths:
      - tfstate/**

permissions:
  id-token: write
  contents: read

jobs:
  provision-dev:
    name: "Provision development infrastructure"
    uses: ./.github/workflows/provision-infrastructure.yml
    with:
      folder-path: "tfstate"
      environment: "development"
    secrets: inherit

  provision-prod:
    name: "Provision production infrastructure"
    needs: provision-dev
    uses: ./.github/workflows/provision-infrastructure.yml
    with:
      folder-path: "tfstate"
      environment: "production"
    secrets: inherit
